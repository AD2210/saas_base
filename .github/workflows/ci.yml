name: ci

on:
  push:
    branches:
      - main
      - develop
      - production
      - 'feature/**'
      - 'hotfix/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop
      - production

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_SECRET: test-secret
      APP_SECRETBOX_KEY: d13e60724269fb0aeaccf241a81b14387480f2e8b42f3669f10ac3bc2581396a
      APP_ADMIN_PASSWORD: test-admin-password
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/saas_base_main_test?serverVersion=16&charset=utf8
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saas_base_main_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, intl, pdo_pgsql, sodium, xml
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-8.5-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint YAML
        run: php bin/console lint:yaml config --parse-tags

      - name: Lint container
        run: php bin/console lint:container --env=dev

      - name: Coding style (PHP-CS-Fixer)
        run: composer qa:cs-fixer

      - name: Coding style (PHPCS)
        run: composer qa:phpcs

      - name: Static analysis (PHPStan)
        run: composer qa:phpstan

      - name: Tests + coverage
        run: vendor/bin/phpunit --coverage-clover var/coverage.xml

      - name: Coverage report
        run: |
          php -r '
          $f = "var/coverage.xml";
          if (!file_exists($f)) {
              fwrite(STDERR, "coverage file missing\n");
              exit(1);
          }
          $xml = simplexml_load_file($f);
          if (!$xml || !isset($xml->project->metrics)) {
              fwrite(STDERR, "invalid coverage xml\n");
              exit(1);
          }
          $metrics = $xml->project->metrics;
          if (!isset($metrics["statements"], $metrics["coveredstatements"])) {
              fwrite(STDERR, "missing coverage metrics in clover xml\n");
              exit(1);
          }
          $statements = (int) $metrics["statements"];
          $covered = (int) $metrics["coveredstatements"];
          if ($statements <= 0) {
              fwrite(STDERR, "invalid statements count in clover xml\n");
              exit(1);
          }
          $rate = ($covered / $statements) * 100;
          printf("Line coverage: %.2f%%\n", $rate);
          if ($rate < 80) {
              printf("::warning::Coverage below target (80%%): %.2f%%\n", $rate);
          }
          '

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clover
          path: var/coverage.xml
