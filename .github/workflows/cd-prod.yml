name: cd-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Branch/tag to deploy
        required: false
        default: main

concurrency:
  group: cd-prod
  cancel-in-progress: false

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_SECRET: test-secret
      APP_SECRETBOX_KEY: d13e60724269fb0aeaccf241a81b14387480f2e8b42f3669f10ac3bc2581396a
      APP_ADMIN_PASSWORD: test-admin-password
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/saas_base_main_test?serverVersion=16&charset=utf8
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saas_base_main_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Resolve ref
        id: resolve_ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.ref }}" ]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_ref.outputs.ref }}

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, intl, pdo_pgsql, sodium, xml
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-8.5-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint YAML
        run: php bin/console lint:yaml config --parse-tags

      - name: Lint container
        run: php bin/console lint:container --env=dev

      - name: Coding style (PHP-CS-Fixer)
        run: composer qa:cs-fixer

      - name: Coding style (PHPCS)
        run: composer qa:phpcs

      - name: Static analysis (PHPStan)
        run: composer qa:phpstan

      - name: Tests
        run: vendor/bin/phpunit --testsuite "Project Test Suite"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: quality-gate
    environment: production
    env:
      PROD_PORT: ${{ secrets.PROD_PORT }}
      PROD_DEPLOY_ENV_FILE: ${{ secrets.PROD_DEPLOY_ENV_FILE }}
    steps:
      - name: Validate secrets
        run: |
          test -n "${{ secrets.PROD_HOST }}"
          test -n "${{ secrets.PROD_USER }}"
          test -n "${{ secrets.PROD_SSH_KEY }}"

      - name: Resolve ref
        id: resolve_ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.ref }}" ]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_ref.outputs.ref }}

      - name: Build release artifact
        run: |
          tar \
            --exclude-vcs \
            --exclude='./.env' \
            --exclude='./.env.dev' \
            --exclude='./.env.test' \
            --exclude='./vendor' \
            --exclude='./var' \
            --exclude='./tests' \
            --exclude='./docs' \
            --exclude='./.idea' \
            --exclude='./docker-compose.dev.yml' \
            --exclude='./src/Debug' \
            --exclude='./src/DataFixtures' \
            --exclude='./config/routes/debug.yaml' \
            --exclude='./public/test.php' \
            -czf "/tmp/saas-release-${GITHUB_SHA}.tar.gz" .

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          PORT="${PROD_PORT:-22}"
          ssh-keyscan -p "${PORT}" "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact
        run: |
          PORT="${PROD_PORT:-22}"
          scp -P "${PORT}" \
            "/tmp/saas-release-${GITHUB_SHA}.tar.gz" \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/tmp/saas-release-${GITHUB_SHA}.tar.gz"

      - name: Deploy on production server
        run: |
          PORT="${PROD_PORT:-22}"
          DEPLOY_ENV_FILE="${PROD_DEPLOY_ENV_FILE:-/etc/saas/server.env}"
          ssh -p "${PORT}" "${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}" \
            "DEPLOY_ENV_FILE='${DEPLOY_ENV_FILE}' DEPLOY_PROFILE='prod' GITHUB_SHA='${GITHUB_SHA}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          ARTIFACT="/tmp/saas-release-${GITHUB_SHA}.tar.gz"
          WORK_DIR="/tmp/saas-deploy-${GITHUB_SHA}"

          rm -rf "${WORK_DIR}"
          mkdir -p "${WORK_DIR}"
          tar -xzf "${ARTIFACT}" -C "${WORK_DIR}"

          chmod +x "${WORK_DIR}/ops/lib/common.sh" "${WORK_DIR}/ops/server/"*.sh
          "${WORK_DIR}/ops/server/deploy_release.sh" "${DEPLOY_ENV_FILE}" "${WORK_DIR}"

          rm -rf "${WORK_DIR}" "${ARTIFACT}"
          REMOTE
