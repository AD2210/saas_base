services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $hexKey: '%env(APP_SECRETBOX_KEY)%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    App\Infrastructure\Provisioning\PostgresDbOrchestrator:
        arguments:
            $main: '@doctrine.dbal.default_connection'

    App\Logging\TenantContextProcessor:
        tags: [ { name: monolog.processor } ]
