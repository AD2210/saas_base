                landing_title: 'Pilot deployments, infra access, and client environments from one focused workspace.'
                landing_lead: 'Route demo creation through the mother app, keep onboarding controlled, and land new users directly inside the operations cockpit.'
                landing_facts: ['Provisioning-aware onboarding', 'Client infrastructure tracking', 'Immediate post-signup access']
