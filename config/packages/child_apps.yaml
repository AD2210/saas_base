        apps:
            vault:
                name: 'Client Secrets Vault'
                api_url: '%env(string:CHILD_APP_VAULT_API_URL)%'
                login_url: '%env(string:CHILD_APP_VAULT_LOGIN_URL)%'
                api_token: '%env(string:CHILD_APP_VAULT_API_TOKEN)%'
                landing_eyebrow: 'Encrypted vault for client operations'
                landing_title: 'Centralize project secrets without scattering them across tools.'
                landing_lead: 'Provision a secure vault, invite your team, and start storing SSH keys, credentials, and production secrets with a controlled onboarding path.'
