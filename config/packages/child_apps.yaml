                onboarding_eyebrow: 'Ops activation'
                onboarding_title: 'Create your ops password'
                onboarding_lead: 'Set your password to activate Deploy Ops Center and continue directly to the login.'
                theme:
                    bg_top: '#eef2ff'
                    bg_bottom: '#f8efe8'
                    surface: 'rgba(255, 255, 255, 0.84)'
                    surface_border: 'rgba(30, 64, 175, 0.18)'
                    text_primary: '#172554'
                    text_secondary: '#43506f'
                    accent: '#1d4ed8'
                    accent_hover: '#1e40af'
                    ring: 'rgba(29, 78, 216, 0.24)'
                    accent_secondary: '#ea580c'
                    glow_primary: 'rgba(59, 130, 246, 0.15)'
                    glow_secondary: 'rgba(249, 115, 22, 0.15)'
