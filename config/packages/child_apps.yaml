                    bg_top: '#eefbf5'
                    bg_bottom: '#f6efe2'
                    surface: 'rgba(255, 255, 255, 0.84)'
                    surface_border: 'rgba(6, 95, 70, 0.18)'
                    text_primary: '#052e2b'
                    text_secondary: '#355955'
                    accent: '#0f766e'
                    accent_hover: '#115e59'
                    ring: 'rgba(15, 118, 110, 0.24)'
                    accent_secondary: '#14b8a6'
                    glow_primary: 'rgba(16, 185, 129, 0.14)'
                    glow_secondary: 'rgba(245, 158, 11, 0.16)'
            ops:
                name: 'Deploy Ops Center'
                api_url: '%env(string:CHILD_APP_OPS_API_URL)%'
                login_url: '%env(string:CHILD_APP_OPS_LOGIN_URL)%'
                api_token: '%env(string:CHILD_APP_OPS_API_TOKEN)%'
