                form_title: 'Request a vault demo'
                form_subtitle: 'Receive your onboarding link, activate your workspace, and start storing secrets immediately.'
                submit_label: 'Start my vault demo'
                onboarding_eyebrow: 'Vault activation'
                onboarding_title: 'Create your vault password'
                onboarding_lead: 'Choose a strong password to unlock your Client Secrets Vault workspace.'
