name: saas-core
services:
  app:
    build: ./docker/php
    container_name: saas-core-app
    env_file: .env
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/main_db?serverVersion=16&charset=utf8"
    ports:
      - "${APP_HTTP_PORT:-8088}:8080"
    depends_on:
      - db
    volumes:
      - ./:/app:cached
      - symfony_var:/app/var
  db:
    image: postgres:16-alpine
    container_name: saas-core-db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: main_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5442}:5432"
  adminer:
    image: adminer:4
    container_name: saas-core-adminer
    depends_on: [db]
    ports:
      - "8089:8080"
volumes:
  pgdata:
  symfony_var:
